<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>21days Auth Connection</title>
    <meta
      name="description"
      content="21days authentication connection page. Redirecting back to the app."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: linear-gradient(180deg, #fffaf5 0%, #fff 50%, #fff7ed 100%);
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --card: rgba(255, 255, 255, 0.92);
        --accent: #f97316;
        --accent-hover: #ea580c;
        --shadow: 0 24px 60px rgba(17, 24, 39, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 440px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(249, 115, 22, 0.1);
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
      }

      .lang-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
      }

      .lang-toggle button {
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 8px 12px;
        border-radius: 999px;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: background-color 160ms ease, color 160ms ease;
      }

      .lang-toggle button.active {
        background: var(--text);
        color: #fff;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.2;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0 0 14px;
        line-height: 1.6;
        color: #4b5563;
        font-size: 16px;
      }

      .btn {
        width: 100%;
        border: 0;
        border-radius: 14px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        font-size: 16px;
        padding: 14px 16px;
        cursor: pointer;
        transition: background-color 160ms ease, transform 160ms ease;
      }

      .btn:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }

      .sub {
        margin-top: 12px;
        font-size: 14px;
        color: var(--muted);
        text-align: center;
      }

      code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }

      @media (max-width: 640px) {
        .card {
          border-radius: 20px;
          padding: 22px;
        }

        h1 {
          font-size: 24px;
        }

        p {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="card-header">
          <div class="eyebrow" data-i18n="eyebrow">21days Auth</div>
          <div class="lang-toggle" aria-label="language switcher">
            <button type="button" id="langKoBtn" data-lang="ko">한국어</button>
            <button type="button" id="langEnBtn" data-lang="en">English</button>
          </div>
        </div>

        <h1 data-i18n="title">Authentication complete</h1>
        <p data-i18n="lead">
          Attempting to redirect you back to the app. Please wait a moment.
        </p>
        <button class="btn" id="openAppBtn" data-i18n="cta">Open the app</button>
        <p class="sub" data-i18n="sub">
          If it does not open automatically, tap the button above.
        </p>
      </div>
    </div>

    <script>
      (function () {
        const STORAGE_KEY = "21days_locale";
        const APP_SCHEME = "twentyonedays://auth-callback";
        const query = window.location.search || "";
        const hash = window.location.hash || "";
        const targetUrl = APP_SCHEME + query + hash;

        const COPY = {
          ko: {
            htmlLang: "ko",
            docTitle: "21days 인증 연결",
            docDescription:
              "21days 앱 인증 연결 페이지입니다. 인증 완료 후 앱으로 자동 이동합니다.",
            eyebrow: "21days 인증",
            title: "인증이 완료되었습니다",
            lead: "앱으로 자동 이동을 시도하고 있습니다. 잠시만 기다려주세요.",
            cta: "앱으로 돌아가기",
            sub: "자동으로 열리지 않으면 버튼을 눌러주세요.",
          },
          en: {
            htmlLang: "en",
            docTitle: "21days Auth Connection",
            docDescription:
              "21days authentication connection page. Redirecting back to the app.",
            eyebrow: "21days Auth",
            title: "Authentication complete",
            lead: "Attempting to redirect you back to the app. Please wait a moment.",
            cta: "Open the app",
            sub: "If it does not open automatically, tap the button above.",
          },
        };

        function normalizeLocale(value) {
          if (!value) return null;
          const lower = String(value).toLowerCase();
          if (lower.startsWith("ko")) return "ko";
          if (lower.startsWith("en")) return "en";
          return null;
        }

        function getQueryLocale() {
          try {
            const params = new URLSearchParams(window.location.search);
            return normalizeLocale(params.get("lang"));
          } catch {
            return null;
          }
        }

        function getStoredLocale() {
          try {
            return normalizeLocale(window.localStorage.getItem(STORAGE_KEY));
          } catch {
            return null;
          }
        }

        function getNavigatorLocale() {
          const langs = Array.isArray(window.navigator.languages)
            ? window.navigator.languages
            : [];
          for (const lang of langs) {
            const normalized = normalizeLocale(lang);
            if (normalized) return normalized;
          }
          return normalizeLocale(window.navigator.language);
        }

        function getInitialLocale() {
          return getQueryLocale() || getStoredLocale() || getNavigatorLocale() || "en";
        }

        function setStoredLocale(locale) {
          try {
            window.localStorage.setItem(STORAGE_KEY, locale);
          } catch {
            // ignore
          }
        }

        function applyLocale(locale) {
          const t = COPY[locale] || COPY.en;
          document.documentElement.lang = t.htmlLang;
          document.title = t.docTitle;
          const meta = document.querySelector('meta[name="description"]');
          if (meta) meta.setAttribute("content", t.docDescription);

          document.querySelectorAll("[data-i18n]").forEach((el) => {
            const key = el.getAttribute("data-i18n");
            if (!key) return;
            const value = t[key];
            if (typeof value === "string") el.textContent = value;
          });

          const koBtn = document.getElementById("langKoBtn");
          const enBtn = document.getElementById("langEnBtn");
          if (koBtn && enBtn) {
            koBtn.classList.toggle("active", locale === "ko");
            enBtn.classList.toggle("active", locale === "en");
          }
        }

        const openApp = () => {
          window.location.href = targetUrl;
        };

        const initialLocale = getInitialLocale();
        setStoredLocale(initialLocale);
        applyLocale(initialLocale);

        const koBtn = document.getElementById("langKoBtn");
        const enBtn = document.getElementById("langEnBtn");
        if (koBtn) {
          koBtn.addEventListener("click", () => {
            setStoredLocale("ko");
            applyLocale("ko");
          });
        }
        if (enBtn) {
          enBtn.addEventListener("click", () => {
            setStoredLocale("en");
            applyLocale("en");
          });
        }

        document.getElementById("openAppBtn").addEventListener("click", openApp);
        setTimeout(openApp, 150);
      })();
    </script>
  </body>
</html>

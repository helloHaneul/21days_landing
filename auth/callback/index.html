<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>21days 인증 연결</title>
    <meta
      name="description"
      content="21days 앱 인증 연결 페이지입니다. 인증 완료 후 앱으로 자동 이동합니다."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: linear-gradient(180deg, #fffaf5 0%, #fff 50%, #fff7ed 100%);
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --card: rgba(255, 255, 255, 0.92);
        --accent: #f97316;
        --accent-hover: #ea580c;
        --shadow: 0 24px 60px rgba(17, 24, 39, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 440px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(249, 115, 22, 0.1);
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.2;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0 0 14px;
        line-height: 1.6;
        color: #4b5563;
        font-size: 16px;
      }

      .btn {
        width: 100%;
        border: 0;
        border-radius: 14px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        font-size: 16px;
        padding: 14px 16px;
        cursor: pointer;
        transition: background-color 160ms ease, transform 160ms ease;
      }

      .btn:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }

      .sub {
        margin-top: 12px;
        font-size: 14px;
        color: var(--muted);
        text-align: center;
      }

      code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }

      @media (max-width: 640px) {
        .card {
          border-radius: 20px;
          padding: 22px;
        }

        h1 {
          font-size: 24px;
        }

        p {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="eyebrow">21days Auth</div>
        <h1>인증이 완료되었습니다</h1>
        <p>앱으로 자동 이동을 시도하고 있습니다. 잠시만 기다려주세요.</p>
        <button class="btn" id="openAppBtn">앱으로 돌아가기</button>
        <p class="sub">자동으로 열리지 않으면 버튼을 눌러주세요.</p>
      </div>
    </div>

    <script>
      (function () {
        const APP_SCHEME = "twentyonedays://auth-callback";
        const query = window.location.search || "";
        const hash = window.location.hash || "";
        const targetUrl = APP_SCHEME + query + hash;

        const openApp = () => {
          window.location.href = targetUrl;
        };

        document.getElementById("openAppBtn").addEventListener("click", openApp);
        setTimeout(openApp, 150);
      })();
    </script>
  </body>
</html>
